<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="card" style="width: 18rem;">
      <div class="card-body">
        <h5 class="card-title">註冊</h5>
        <form id="signup-form" action="/signup" method="POST">
            <div class="mb-3">
                <label for="dorm" class="form-label">宿舍</label>
                <select class="form-select" id="dorm" name="dorm">
                    <option value="">請選擇宿舍</option>
                    <!-- 由 JavaScript 動態填入 -->
                </select>
            </div>
            <div class="mb-3">
                <label for="user_name" class="form-label">姓名</label>
                <input class="form-control" type="text" id="user_name" name="user_name" placeholder="請輸入姓名">
            </div>
            <div class="mb-3">
                <label for="student_id" class="form-label">學號</label>
                <input class="form-control" type="text" id="student_id" name="student_id" placeholder="請輸入學號">
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input class="form-control" type="password" id="password" name="password" placeholder="Password" aria-label="Password input example">
            </div>
            <button type="submit" class="btn btn-primary">註冊</button>
            <p id="signup-msg"></p>
            </div>
        </form>
    </div>
        
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script>
        async function loadDorms() {
            const response = await fetch('/api/dorm');
            const dorms = await response.json();

            const select = document.getElementById('dorm');
            dorms.forEach(dorm => {
            const option = document.createElement('option');
            option.textContent = dorm.DORM_NAME;
            select.appendChild(option);
            });
        }

        loadDorms();
    </script>

</html>
